<section class="overflow-hidden mt-148">
  <div class="container">
    <div class="line-partners">
      <div class="static-line-title">
        <h2 class="section-title">
          Наши партнеры
        </h2>
      </div>

      <div class="line-partners__box-swiper">
        <div class="swiper-line-partners swiper-container">
          <div class="swiper-wrapper">

            <div class="swiper-slide">
              <article class="card-line-partners">
                <img src="img/card-line-partners/1.png" alt="img">
              </article>
            </div>

            <div class="swiper-slide">
              <article class="card-line-partners">
                <img src="img/card-line-partners/2.png" alt="img">
              </article>
            </div>

            <div class="swiper-slide">
              <article class="card-line-partners">
                <img src="img/card-line-partners/3.png" alt="img">
              </article>
            </div>

            <div class="swiper-slide">
              <article class="card-line-partners">
                <img src="img/card-line-partners/4.png" alt="img">
              </article>
            </div>

            <div class="swiper-slide">
              <article class="card-line-partners">
                <img src="img/card-line-partners/5.png" alt="img">
              </article>
            </div>

            <div class="swiper-slide">
              <article class="card-line-partners">
                <img src="img/card-line-partners/6.png" alt="img">
              </article>
            </div>

          </div>
        </div>

        <div class="static-grour-btn">
          <div class="static-grour-swiper-btn">
            <button class="swiper-btn-type-1 --prev btn-reset">
              <svg width="26" height="12" viewBox="0 0 26 12" fill="none">
                <use xlink:href="img/sprite.svg#arrowBtnSwiper1"></use>
              </svg>
            </button>
            <button class="swiper-btn-type-1 --next btn-reset">
              <svg width="26" height="12" viewBox="0 0 26 12" fill="none">
                <use xlink:href="img/sprite.svg#arrowBtnSwiper2"></use>
              </svg>
            </button>
          </div>
        </div>
      </div>

    </div>
  </div>
</section>
