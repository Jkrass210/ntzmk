<section class="mt-148">
  <div class="container">
    <div class="form-type-1">
      <div class="form-type-1__body">
        <div class="form-type-1__left">
          <h4 class="title">У вас есть вопросы?</h4>
          <p class="desc">Оставьте заявку <br>и мы свяжемся с вами</p>
        </div>
        <div class="form-type-1__right">
          <form class="form-type-1__form js-form">
            <div class="form-type-1__list">
              <p class="form-type-1__desc">Необходимо заполнить информацию</p>
              <div class="form-type-1__group-input">
                <label class="input-type-1">
                  <input class="input-type-1__input required" type="text" name="name" placeholder="Ваше имя">
                  <span class="input-error-info">Введите ваше имя</span>
                </label>

                <label class="input-type-1">
                  <input class="input-type-1__input js-phone-mask required required-phone" type="text" name="phone" placeholder="Номер телефона">
                  <span class="input-error-info">Введите номер телефона</span>
                </label>

                <label class="input-type-1">
                  <input class="input-type-1__input required required-mail" type="text" name="email" placeholder="Эл. адрес">
                  <span class="input-error-info">Введите почту</span>
                </label>
              </div>

              <div class="form-type-1__group-submit">
                <button class="form-type-1__submit btn-reset" type="submit">
                  <span class="text">Отправить запрос</span>
                </button>

                <label class="input-type-checkbox">
                  <input class="input-type-checkbox__input required-checkbox required" type="checkbox" name="checkbox" checked>
                  <span class="castom">
                    <svg xmlns="http://www.w3.org/2000/svg" width="12" height="11" viewBox="0 0 12 11" fill="none">
                      <path d="M11.1992 0.699951L3.84922 9.44995L0.699219 5.94995" stroke="#00cb62" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                  </span>
                  <p class="input-type-checkbox__desc">
                    Нажимая отправить вы даёте согласие с <a href="#">политикой обработки персональных данных</a>
                  </p>
                </label>
              </div>
            </div>
            <div class="form-type-1__form-success">
              <p>Спасибо!</p>
              <p>Наш менеджер свяжется с вами!</p>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</section>
